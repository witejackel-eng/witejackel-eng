<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-labelledby="banner-title">
  <title id="banner-title">Aditya — Web Designer &amp; Full-Stack Developer</title>

  <!--
    Design tokens sourced from dev-aditya.com portfolio:
    Background:  #FAFAF7   (cream / off-white)
    Text:        #080808   (near-black)
    Muted:       #55514A   (restrained neutral)
    Maroon:      #7A1F2B   (accent)
    Maroon-dark: #55131D
    Maroon-light:#9E2D3C
    Border:      #111111
  -->

  <!-- Background card — cream fills on both GitHub dark (#0d1117) and light (#ffffff) -->
  <rect x="0.5" y="0.5" width="1199" height="279"
        fill="#FAFAF7" stroke="#111111" stroke-width="1"/>

  <!-- Left vertical accent — maroon editorial gutter line -->
  <line x1="80" y1="50" x2="80" y2="240"
        stroke="#7A1F2B" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Primary heading: ADITYA -->
  <text x="108" y="114"
        font-family="'Geist Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="80" font-weight="700" fill="#080808"
        letter-spacing="0.25em">ADITYA</text>

  <!-- Editorial horizontal rule -->
  <line x1="108" x2="1120" y1="138" y2="138"
        stroke="#7A1F2B" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="108" y="176"
        font-family="'Geist Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="500" fill="#55514A"
        letter-spacing="0.22em">WEB DESIGNER + FULL-STACK DEVELOPER</text>

  <!-- Tagline — maroon separators for editorial rhythm -->
  <text x="108" y="210"
        font-family="'Geist Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12.5" font-weight="400" fill="#55514A"
        letter-spacing="0.16em">
    <tspan>DESIGN</tspan><tspan fill="#7A1F2B"> / </tspan><tspan fill="#55514A">CODE</tspan><tspan fill="#7A1F2B"> / </tspan><tspan fill="#55514A">SYSTEMS</tspan><tspan fill="#7A1F2B"> / </tspan><tspan fill="#55514A">DEPLOYMENT</tspan>
  </text>

  <!-- Signature mark — bottom-right, monospace, restrained -->
  <text x="1120" y="252"
        font-family="'Geist Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="11" font-weight="400" fill="#7A1F2B"
        letter-spacing="0.1em" text-anchor="end">witejackel-eng</text>

  <!-- Small terminal-blink square accent at rule origin — editorial marker -->
  <rect x="108" y="134" width="5" height="5" fill="#7A1F2B"/>
</svg>
